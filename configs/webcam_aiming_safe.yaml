source:
  source_type: webcam
  source_path: null
  stream_url: null
  camera_index: 0
  camera_width: 800
  camera_height: 450
  process_every_n_frames: 1
  reconnect_delay_seconds: 1.0
  max_reconnect_attempts: 5
  read_fail_threshold: 3
  buffer_size: 1
  snapshot_timeout_seconds: 2.0
  snapshot_use_cache_bust: true

detector:
  model_path: yolo26n.pt
  imgsz: 640
  confidence_threshold: 0.18
  iou_threshold: 0.45
  device: cpu
  class_name: cat

target_selection_strategy: closest_to_center

overlay:
  minimal_overlay: true
  debug_overlay: false
  show_fps: true
  show_debug_counters: false
  show_track_boxes: false
  show_track_crosshair: true
  show_normalized_coords: false
  box_color:
    - 0
    - 200
    - 255
  predicted_box_color:
    - 0
    - 140
    - 255
  secondary_box_color:
    - 150
    - 150
    - 150
  marker_color:
    - 255
    - 255
    - 255
  text_color:
    - 240
    - 240
    - 240
  accent_color:
    - 80
    - 220
    - 120
  warning_color:
    - 0
    - 180
    - 255
  error_color:
    - 0
    - 80
    - 255
  background_color:
    - 16
    - 16
    - 16
  box_thickness: 2
  secondary_box_thickness: 1
  marker_thickness: 2
  marker_size: 18
  marker_gap: 6
  center_radius: 3
  font_scale: 0.55
  font_thickness: 1
  show_track_labels: false
  show_detection_labels: false
  show_zone_labels: false
  show_cat_count: true
  padding: 8
  line_height: 22

output:
  show_window: true
  save_output: false
  output_path: output/tracking_cat.mp4
  window_name: TrackingCat

logging:
  log_level: INFO
  per_frame_debug: false
  log_coordinates: false
  coordinates_log_path: null
  coordinates_log_format: csv

tracking:
  tracking_enabled: true
  multi_target_enabled: true
  tracker_only_mode_after_confirm: true
  detector_interval_while_tracking: 4
  reacquire_after_failed_tracker_frames: 2
  max_tracker_only_frames_without_detection: 8
  acquire_confidence_threshold: 0.18
  keep_confidence_threshold: 0.06
  confirm_frames: 1
  reconfirm_frames: 1
  hold_without_detection_frames: 4
  lost_transition_frames: 5
  max_missing_frames: 10
  hard_remove_frames: 12
  reacquire_max_frames: 5
  iou_gate: 0.12
  center_distance_gate: 160
  min_area_ratio: 0.20
  max_area_ratio: 4.0
  soft_iou_gate: 0.03
  soft_center_distance_gate: 180
  soft_min_area_ratio: 0.15
  soft_max_area_ratio: 5.0
  smoothing_alpha: 0.55
  preserve_confirmed_tracks: true
  never_drop_confirmed_on_single_bad_frame: true
  keep_lost_tracks: true
  max_active_tracks: 16
  use_motion_prediction: false
  display_sort_mode: top_to_bottom_left_to_right
  frame_tracker_backend: KCF

scene_zones:
  enabled: true
  draw_zones: true
  draw_track_locations: false
  surface_priority_over_floor: true
  bbox_overlap_threshold: 0.15
  coordinates_mode: normalized
  zone_editor_enabled: false
  zones:
    - name: restricted_1
      enabled: true
      zone_type: restricted
      shape_type: polygon
      coordinates_mode: normalized
      points:
        - [0.201563, 0.3]
        - [0.360938, 0.35]
        - [0.690625, 0.272917]
        - [0.99375, 0.327083]
        - [0.995313, 0.041667]
        - [0.6625, 0.03125]
        - [0.1625, 0.04375]
        - [0.2, 0.295833]

    - name: restricted_2
      enabled: true
      zone_type: restricted
      shape_type: polygon
      coordinates_mode: normalized
      points:
        - [0.001563, 0.616667]
        - [0.420312, 0.99375]
        - [0.004687, 0.99375]
        - [0.003125, 0.622917]

    - name: floor_1
      enabled: true
      zone_type: floor
      shape_type: polygon
      coordinates_mode: normalized
      points:
        - [0.1375, 0.020833]
        - [0.185938, 0.30625]
        - [0.367188, 0.364583]
        - [0.684375, 0.289583]
        - [0.995313, 0.339583]
        - [0.992188, 0.989583]
        - [0.4375, 0.985417]
        - [0.010937, 0.6]
        - [0.010937, 0.008333]
        - [0.132812, 0.01875]

surface_alert:
  enabled: true
  trigger_on_surface_entry: true
  alert_point_mode: crosshair_center
  trigger_only_from_floor: true
  trigger_from_unknown: false
  min_floor_frames_before_alert: 4
  cooldown_seconds: 2.0
  min_interval_per_track: 5.0
  global_min_interval: 1.0
  repeat_on_same_surface: false
  sound_file: sounds/cat_alert.wav
  beep_fallback: true
  continuous_while_in_zone: true
  continuous_zone_types:
    - restricted
  repeat_interval_seconds: 1.0
  stop_when_zone_empty: true
  show_overlay_message: true
  overlay_message_frames: 20

alert_recording:
  enabled: true
  output_dir: /home/kelbus/PycharmProjects/TrackingCatWIFI/alert_video
  prebuffer_seconds: 3.0
  postbuffer_seconds: 1.5
  fps_fallback: 15.0
  codec: mp4v
  draw_recording_overlay: true
  include_wallclock_timestamp: true
  include_zone_name: true
  include_track_ids: true
  include_elapsed_seconds: true

resize:
  enabled: false
  width: 960
  height: 540
