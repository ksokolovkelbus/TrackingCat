source:
  source_type: rtsp
  source_path: null
  stream_url: http://192.168.8.132:8081/video
  camera_index: 0
  camera_width: 1280
  camera_height: 720
  process_every_n_frames: 1
  reconnect_delay_seconds: 0.5
  max_reconnect_attempts: 20
  read_fail_threshold: 2
  buffer_size: 1
  snapshot_timeout_seconds: 2.0
  snapshot_use_cache_bust: true

detector:
  model_path: yolo26s.pt
  imgsz: 640
  confidence_threshold: 0.28
  iou_threshold: 0.45
  device: cpu
  class_name: cat
  max_frame_area_ratio: 0.45

target_selection_strategy: closest_to_center

pan_tilt:
  enabled: true
  manual_control_only: true
  base_url: http://192.168.8.140
  request_timeout_seconds: 0.8
  status_poll_interval_seconds: 2.0
  default_step_degrees: 2
  coarse_step_degrees: 6
  show_controls: true
  button_up_direction: left
  button_down_direction: right
  button_left_direction: down
  button_right_direction: up
  hold_repeat_interval_seconds: 0.10
  default_speed_mode: medium

overlay:
  minimal_overlay: true
  debug_overlay: false
  show_fps: true
  show_debug_counters: false
  show_track_boxes: false
  show_track_crosshair: false
  show_normalized_coords: false
  show_track_labels: false
  show_detection_labels: false
  show_zone_labels: false
  show_cat_count: false
  box_color: [0, 200, 255]
  predicted_box_color: [0, 140, 255]
  secondary_box_color: [150, 150, 150]
  marker_color: [0, 0, 255]
  marker_crosshair_color: [255, 255, 255]
  marker_dot_color: [0, 0, 255]
  text_color: [240, 240, 240]
  accent_color: [80, 220, 120]
  warning_color: [0, 180, 255]
  error_color: [0, 80, 255]
  background_color: [16, 16, 16]
  box_thickness: 2
  secondary_box_thickness: 1
  marker_thickness: 2
  marker_size: 18
  marker_gap: 5
  center_radius: 3
  marker_ring_radius: 14
  marker_dot_radius: 3
  font_scale: 0.8
  font_thickness: 2
  padding: 8
  line_height: 22

output:
  show_window: true
  save_output: false
  output_path: output/tracking_cat.mp4
  window_name: TrackingCat iPad PanTilt

logging:
  log_level: INFO
  per_frame_debug: false
  log_coordinates: false
  coordinates_log_path: null
  coordinates_log_format: csv

tracking:
  tracking_enabled: false
  multi_target_enabled: false
  tracker_only_mode_after_confirm: false
  detector_interval_while_tracking: 6
  reacquire_after_failed_tracker_frames: 2
  max_tracker_only_frames_without_detection: 8
  acquire_confidence_threshold: 0.28
  keep_confidence_threshold: 0.1
  confirm_frames: 2
  reconfirm_frames: 2
  hold_without_detection_frames: 3
  lost_transition_frames: 5
  max_missing_frames: 16
  hard_remove_frames: 24
  reacquire_max_frames: 10
  iou_gate: 0.12
  center_distance_gate: 180
  min_area_ratio: 0.2
  max_area_ratio: 4.0
  soft_iou_gate: 0.03
  soft_center_distance_gate: 150
  soft_min_area_ratio: 0.15
  soft_max_area_ratio: 5.0
  smoothing_alpha: 0.85
  preserve_confirmed_tracks: true
  never_drop_confirmed_on_single_bad_frame: true
  keep_lost_tracks: true
  max_active_tracks: 1
  use_motion_prediction: false
  display_sort_mode: top_to_bottom_left_to_right
  frame_tracker_backend: KCF

scene_zones:
  enabled: false
  draw_zones: false
  draw_track_locations: false
  surface_priority_over_floor: true
  bbox_overlap_threshold: 0.15
  coordinates_mode: normalized
  zone_editor_enabled: false
  zones: []

surface_alert:
  enabled: false
  trigger_on_surface_entry: false
  alert_point_mode: crosshair_center
  trigger_only_from_floor: false
  trigger_from_unknown: false
  cooldown_seconds: 2.0
  min_interval_per_track: 5.0
  global_min_interval: 1.0
  repeat_on_same_surface: false
  sound_file: sounds/cat_alert.wav
  beep_fallback: false
  continuous_while_in_zone: false
  continuous_zone_types: [restricted]
  repeat_interval_seconds: 1.0
  stop_when_zone_empty: true
  show_overlay_message: false
  overlay_message_frames: 20

alert_recording:
  enabled: false
  output_dir: /home/kelbus/PycharmProjects/TrackingCatWIFI/alert_video
  prebuffer_seconds: 3.0
  postbuffer_seconds: 1.5
  fps_fallback: 15.0
  codec: mp4v
  draw_recording_overlay: false
  include_wallclock_timestamp: true
  include_zone_name: true
  include_track_ids: true
  include_elapsed_seconds: true

resize:
  enabled: false
  width: 960
  height: 540
